services:
  sales-training:
    build: .
    container_name: sales-training
    restart: unless-stopped
    networks:
      - caddy-net

  progress-api:
    build: ./progress_api
    container_name: progress-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8511:8000"
    volumes:
      - progress-data:/data
    networks:
      - caddy-net

volumes:
  progress-data:

networks:
  caddy-net:
    external: true
