<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Document Viewer · SMARTWING™ Sales Training</title>
<!-- marked.js for markdown, mammoth for .docx, both pinned to specific versions -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.2/mammoth.browser.min.js" crossorigin="anonymous"></script>
<style>
:root{--bg:#f8fafc;--card:#fff;--accent:#0f4c81;--accent2:#1a6fb5;--green:#16a34a;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
.top-bar{background:var(--accent);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.top-bar h1{font-size:16px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-bar a,.top-bar button{color:#fff;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);padding:6px 14px;border-radius:6px;font-size:13px;text-decoration:none;cursor:pointer;font-family:inherit;}
.top-bar a:hover,.top-bar button:hover{background:rgba(255,255,255,.25);}
.wrap{max-width:880px;margin:0 auto;padding:32px 32px 80px;}
.doc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:48px 56px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.doc h1,.doc h2,.doc h3,.doc h4{color:var(--accent);margin:24px 0 10px;line-height:1.3;}
.doc h1{font-size:28px;border-bottom:2px solid var(--border);padding-bottom:10px;margin-top:0;}
.doc h2{font-size:22px;}
.doc h3{font-size:18px;}
.doc h4{font-size:15px;color:var(--text);}
.doc p,.doc li{font-size:15px;margin:8px 0;}
.doc ul,.doc ol{margin:8px 0 12px 24px;}
.doc table{border-collapse:collapse;margin:14px 0;width:100%;font-size:14px;}
.doc th{background:var(--accent);color:#fff;padding:8px 12px;text-align:left;font-weight:600;}
.doc td{padding:8px 12px;border-bottom:1px solid var(--border);}
.doc tr:nth-child(even) td{background:#f8fafc;}
.doc blockquote{border-left:4px solid var(--accent2);background:#f0f7ff;padding:10px 16px;margin:12px 0;color:#334155;border-radius:0 6px 6px 0;}
.doc code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:13px;font-family:Consolas,Monaco,monospace;}
.doc pre{background:#0f172a;color:#e2e8f0;padding:14px 18px;border-radius:8px;overflow-x:auto;margin:12px 0;}
.doc pre code{background:none;color:inherit;padding:0;}
.doc img{max-width:100%;height:auto;border-radius:6px;margin:8px 0;}
.doc hr{border:none;border-top:1px solid var(--border);margin:24px 0;}
.doc a{color:var(--accent2);}
.status{padding:60px 32px;text-align:center;color:var(--muted);font-size:15px;}
.status.error{color:#b91c1c;}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.notice{background:#fffbeb;border:1px solid #fcd34d;border-left:4px solid #d97706;padding:12px 16px;border-radius:0 6px 6px 0;margin:0 0 20px;font-size:14px;color:#78350f;}
.notice a{color:#78350f;font-weight:600;text-decoration:underline;}
@media print{
  .top-bar{display:none;}
  .wrap{padding:0;max-width:none;}
  .doc{border:none;box-shadow:none;padding:0;}
}
@media(max-width:640px){
  .wrap{padding:16px;}
  .doc{padding:24px 20px;}
}
</style>
</head>
<body>
<div class="top-bar">
  <h1 id="doc-title">Loading…</h1>
  <a id="raw-link" href="#" target="_blank" rel="noopener">Open Original</a>
  <button onclick="window.print()">Print / PDF</button>
  <a href="sales-training.html">← Back to Portal</a>
</div>
<div class="wrap">
  <div id="content" class="doc"><div class="status"><div class="spinner"></div><div>Loading document…</div></div></div>
</div>

<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  const titleEl = document.getElementById('doc-title');
  const contentEl = document.getElementById('content');
  const rawLink = document.getElementById('raw-link');

  function showError(msg, detail) {
    contentEl.innerHTML = `<div class="status error"><strong>Could not load document</strong><br><br>${msg}${detail ? `<br><br><code style="font-size:12px;">${detail}</code>` : ''}</div>`;
  }

  if (!file) {
    showError('No file specified. Add <code>?file=path/to/document.md</code> to the URL.');
    titleEl.textContent = 'Document Viewer';
    return;
  }

  // Security: only allow relative paths within the site (no protocol, no parent traversal)
  if (/^[a-z]+:\/\//i.test(file) || file.includes('..')) {
    showError('Invalid file path.');
    return;
  }

  const filename = file.split('/').pop();
  titleEl.textContent = filename;
  document.title = filename + ' · SMARTWING™ Sales Training';
  rawLink.href = file;

  const ext = (filename.split('.').pop() || '').toLowerCase();

  try {
    if (ext === 'md' || ext === 'markdown') {
      const res = await fetch(file);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      // Strip the .docx.md hybrid suffix from title display if present
      if (filename.endsWith('.docx.md')) {
        document.title = filename.replace('.docx.md', '') + ' · SMARTWING™ Sales Training';
        titleEl.textContent = filename.replace('.docx.md', '');
      }
      marked.setOptions({ gfm: true, breaks: false, headerIds: true });
      contentEl.innerHTML = marked.parse(text);
    } else if (ext === 'docx') {
      const res = await fetch(file);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const buf = await res.arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer: buf });
      const notice = `<div class="notice">This is an in-browser preview of a Word document. For the original formatting, <a href="${file}" target="_blank" rel="noopener">download the .docx</a>.</div>`;
      contentEl.innerHTML = notice + result.value;
    } else if (ext === 'pdf') {
      // Just embed the PDF
      contentEl.innerHTML = `<embed src="${file}" type="application/pdf" style="width:100%;height:80vh;border:none;border-radius:6px;" />`;
    } else {
      // Unknown format - just offer download
      contentEl.innerHTML = `<div class="status">This file type (<code>.${ext}</code>) cannot be previewed in the browser.<br><br><a href="${file}" target="_blank" rel="noopener" style="display:inline-block;margin-top:12px;padding:10px 20px;background:#0f4c81;color:#fff;border-radius:6px;text-decoration:none;">Download ${filename}</a></div>`;
    }
  } catch (err) {
    showError('The document could not be loaded.', err.message || String(err));
  }
})();
</script>
</body>
</html>
